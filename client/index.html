<!DOCTYPE html>
<html lang="ka">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, viewport-fit=cover" />

  <!-- PWA / Theme -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#344C3D" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MR Studio" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="apple-touch-startup-image" href="/icon.svg" />

  <!-- SEO Meta Tags -->
  <title>THE MR Studio | Nail &amp; Laser Artistic Studio</title>
  <meta name="description"
    content="THE MR Studio – პრემიუმ ნოგელი და ლაზერული სტუდია. დაჯავშნეთ სერვისი ონლაინ. Premium nail art, laser treatments, and cosmetology in Tbilisi." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://mrstudio.ge/" />

  <!-- Open Graph / Social — TODO: replace og:image with a real 1200×630 PNG -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://mrstudio.ge/" />
  <meta property="og:title" content="THE MR Studio | Nail &amp; Laser Artistic Studio" />
  <meta property="og:description"
    content="Premium nail art, laser treatments, and cosmetology. Book your appointment online." />
  <meta property="og:site_name" content="THE MR Studio" />
  <meta property="og:image" content="https://mrstudio.ge/icon.svg" />
  <meta property="og:image:alt" content="THE MR Studio" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="THE MR Studio | Nail &amp; Laser Artistic Studio" />
  <meta name="twitter:description"
    content="Premium nail art, laser treatments, and cosmetology. Book your appointment online." />
  <meta name="twitter:image" content="https://mrstudio.ge/icon.svg" />

  <!-- Only load fonts actually used by the design system -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Inter:opsz,wght@14..32,300..700&display=swap"
    rel="stylesheet" />

  <!-- Favicon — evergreen brand mark -->
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
</head>

<body>
  <!-- Global Editorial Print Noise Overlay -->
  <div class="bg-noise"></div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
